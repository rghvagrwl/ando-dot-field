<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANDO — dot field</title>
<style>
  @font-face{
    font-family:"Geist";
    src:url("./Geist-Regular.ttf") format("truetype");
    font-weight:400;
    font-style:normal;
  }
  :root{
    --bg:#FAFAF8;
    --accent:#2563EB;
    --ink:#2b2b2b;
    --muted:#b7b7b2;
    --line:rgba(24,24,24,.08);
    --soft:rgba(24,24,24,.03);
    --sidebar-width:360px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    font-family:"Geist",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
    color:var(--ink);
    overflow:hidden;
  }
  .app{
    position:relative;
    display:flex;
    width:100%;
    height:100%;
  }
  .sidebar,
  .sidebar-handle,
  .picker-panel{
    display:none !important;
  }
  .sidebar{
    position:relative;
    z-index:8;
    flex:0 0 var(--sidebar-width);
    width:var(--sidebar-width);
    height:100%;
    padding:152px 20px 24px;
    background:var(--bg);
    border-left:1px solid var(--line);
    transition:flex-basis .28s ease,width .28s ease,padding .28s ease,border-color .28s ease;
    overflow:hidden;
  }
  body.sidebar-closed .sidebar{
    flex-basis:0;
    width:0;
    padding-left:0;
    padding-right:0;
    border-color:transparent;
  }
  .sidebar-inner{
    width:calc(var(--sidebar-width) - 40px);
    display:flex;
    flex-direction:column;
    height:100%;
    transition:opacity .18s ease,transform .18s ease;
  }
  .sidebar-header{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .sidebar-main{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin:auto 0;
  }
  .sidebar-footer{
    display:flex;
    flex-direction:column;
    gap:8px;
    margin-top:auto;
  }
  body.sidebar-closed .sidebar-inner{
    opacity:0;
    transform:translateX(-12px);
    pointer-events:none;
  }
  .sidebar-handle{
    position:fixed;
    top:24px;
    right:24px;
    z-index:12;
    width:42px;
    height:42px;
    border:none;
    border-radius:999px;
    background:rgba(0,0,0,.06);
    color:rgba(43,43,43,.68);
    display:grid;
    place-items:center;
    cursor:pointer;
    transition:background .18s ease,color .18s ease,transform .18s ease,opacity .18s ease;
  }
  .sidebar-handle:hover{
    background:rgba(0,0,0,.09);
    color:rgba(43,43,43,.82);
  }
  .sidebar-handle svg{
    width:18px;
    height:18px;
    stroke:currentColor;
    stroke-width:2.8;
    fill:none;
    stroke-linecap:round;
  }
  .stage-wrap{
    position:relative;
    flex:1 1 auto;
    min-width:0;
    height:100%;
  }
  .stage{position:relative;width:100%;height:100%;cursor:default;}
  canvas{display:block;width:100%;height:100%;cursor:default;}
  .sidebar-title{
    font-size:28px;
    line-height:1;
    letter-spacing:-.04em;
    font-weight:400;
    color:var(--ink);
  }
  .color-card{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .word-switch{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
  }
  .toggle-button{
    width:100%;
    height:42px;
    border:1px solid var(--line);
    border-radius:16px;
    background:var(--soft);
    color:rgba(43,43,43,.62);
    cursor:pointer;
    font:inherit;
    font-size:13px;
    font-weight:600;
    letter-spacing:.04em;
    transition:background .15s ease,border-color .15s ease,color .15s ease;
  }
  .word-button{
    height:42px;
    border:1px solid var(--line);
    border-radius:16px;
    background:var(--soft);
    color:rgba(43,43,43,.62);
    cursor:pointer;
    font:inherit;
    font-size:13px;
    letter-spacing:.04em;
    transition:background .15s ease,border-color .15s ease,color .15s ease;
  }
  .word-button.is-active{
    background:rgba(37,99,235,.18);
    border-color:rgba(37,99,235,.72);
    color:var(--ink);
  }
  .toggle-button.is-active{
    background:rgba(37,99,235,.18);
    border-color:rgba(37,99,235,.72);
    color:var(--ink);
  }
  .color-card label{
    display:block;
    font-size:11px;
    font-weight:600;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--muted);
  }
  .compact-control{
    display:grid;
    grid-template-columns:56px 1fr 96px;
    align-items:center;
    min-height:58px;
    background:var(--soft);
    border:1px solid var(--line);
    border-radius:18px;
    overflow:hidden;
  }
  .compact-control + .compact-control{margin-top:8px;}
  .compact-control.compact-control--hex-only{
    grid-template-columns:56px 1fr;
  }
  .swatch-button{
    width:56px;
    height:58px;
    border:none;
    background:transparent;
    padding:10px 12px;
    cursor:pointer;
    appearance:none;
  }
  .swatch-button::before{
    content:"";
    display:block;
    width:100%;
    height:100%;
    border-radius:10px;
    background:var(--swatch, #ffffff);
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.08);
  }
  .swatch-button:focus-visible{
    outline:2px solid rgba(37,99,235,.42);
    outline-offset:2px;
  }
  .compact-hex,
  .compact-number{
    width:100%;
    height:58px;
    border:none;
    background:transparent;
    padding:0 10px;
    color:var(--ink);
    font:inherit;
  }
  .compact-hex{
    font-size:15px;
    letter-spacing:.01em;
  }
  .compact-hex:focus,
  .compact-number:focus{
    outline:none;
  }
  .compact-opacity{
    display:grid;
    grid-template-columns:1fr 22px;
    align-items:center;
    align-self:stretch;
    border-left:1px solid var(--line);
    padding:0 10px 0 12px;
  }
  .compact-number{
    padding:0;
    text-align:center;
    font-size:16px;
  }
  .compact-number::-webkit-outer-spin-button,
  .compact-number::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .compact-number[type=number]{
    -moz-appearance:textfield;
    appearance:textfield;
  }
  .compact-opacity span{
    color:rgba(43,43,43,.56);
    font-size:15px;
    text-align:right;
  }
  .picker-panel{
    position:fixed;
    z-index:30;
    width:326px;
    padding:14px;
    border-radius:18px;
    background:#2f2f2f;
    box-shadow:0 22px 50px rgba(0,0,0,.32), 0 2px 10px rgba(0,0,0,.14);
    color:#fff;
  }
  .picker-panel[hidden]{
    display:none;
  }
  .picker-surface{
    position:relative;
    height:286px;
    border-radius:12px;
    overflow:hidden;
    background:linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, hsl(0 100% 50%));
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.06);
    cursor:crosshair;
  }
  .picker-surface-handle,
  .picker-slider-handle{
    position:absolute;
    width:18px;
    height:18px;
    border-radius:999px;
    background:#fff;
    border:2px solid rgba(255,255,255,.92);
    box-shadow:0 4px 10px rgba(0,0,0,.28);
    pointer-events:none;
    transform:translate(-50%, -50%);
  }
  .picker-sliders{
    margin-top:14px;
    display:grid;
    gap:12px;
  }
  .picker-slider-wrap{
    position:relative;
    height:30px;
    display:flex;
    align-items:center;
  }
  .picker-slider-track{
    position:absolute;
    inset:0;
    border-radius:999px;
    overflow:hidden;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.1);
  }
  .picker-slider-track--hue{
    background:linear-gradient(90deg,#f00 0%,#ff0 16%,#0f0 33%,#0ff 50%,#00f 66%,#f0f 83%,#f00 100%);
  }
  .picker-slider-track--alpha{
    background:
      linear-gradient(45deg, rgba(255,255,255,.18) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.18) 75%),
      linear-gradient(45deg, rgba(255,255,255,.18) 25%, transparent 25%, transparent 75%, rgba(255,255,255,.18) 75%);
    background-position:0 0, 8px 8px;
    background-size:16px 16px;
  }
  .picker-slider-track--alpha::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg, var(--alpha-start, rgba(255,255,255,0)), var(--alpha-end, rgba(255,255,255,1)));
  }
  .picker-slider{
    position:relative;
    z-index:1;
    width:100%;
    margin:0;
    background:transparent;
    appearance:none;
    -webkit-appearance:none;
    cursor:pointer;
  }
  .picker-slider:focus{
    outline:none;
  }
  .picker-slider::-webkit-slider-runnable-track{
    height:30px;
    background:transparent;
  }
  .picker-slider::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:30px;
    height:30px;
    border-radius:999px;
    border:4px solid #fff;
    background:transparent;
    box-shadow:0 4px 10px rgba(0,0,0,.28);
    margin-top:0;
  }
  .picker-slider::-moz-range-track{
    height:30px;
    background:transparent;
    border:none;
  }
  .picker-slider::-moz-range-thumb{
    width:22px;
    height:22px;
    border-radius:999px;
    border:4px solid #fff;
    background:transparent;
    box-shadow:0 4px 10px rgba(0,0,0,.28);
  }
  .picker-alpha-wrap.is-hidden{
    display:none;
  }
  .picker-footer{
    margin-top:14px;
    display:grid;
    grid-template-columns:74px 1fr 76px 24px;
    gap:8px;
    align-items:center;
  }
  .picker-mode,
  .picker-input{
    height:48px;
    border:1px solid rgba(255,255,255,.1);
    border-radius:12px;
    background:#3a3a3a;
    color:#fff;
    font:inherit;
  }
  .picker-mode{
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    letter-spacing:.06em;
    text-transform:uppercase;
  }
  .picker-input{
    padding:0 12px;
  }
  .picker-input--hex{
    font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,monospace;
    font-size:15px;
  }
  .picker-input--opacity{
    text-align:center;
    font-size:15px;
  }
  .picker-input:focus{
    outline:none;
    border-color:rgba(255,255,255,.26);
  }
  .picker-input::-webkit-outer-spin-button,
  .picker-input::-webkit-inner-spin-button{
    -webkit-appearance:none;
    margin:0;
  }
  .picker-input[type=number]{
    appearance:textfield;
    -moz-appearance:textfield;
  }
  .picker-percent{
    font-size:15px;
    color:rgba(255,255,255,.7);
    text-align:center;
  }
  .picker-percent.is-hidden{
    visibility:hidden;
  }
  @media (max-width: 900px){
    :root{
      --sidebar-width:320px;
    }
    .sidebar-handle{
      width:42px;
      height:42px;
      top:18px;
      right:18px;
    }
    .sidebar-handle svg{
      width:18px;
      height:18px;
    }
  }
  @media (max-width: 700px){
    :root{
      --sidebar-width:min(100vw,320px);
    }
  }
</style>
</head>
<body class="sidebar-open">
  <div class="app">
    <div class="stage-wrap">
      <div class="stage" id="stage">
        <canvas id="c"></canvas>
      </div>
    </div>

    <aside class="sidebar panel is-open" id="panel">
      <div class="sidebar-inner panel-body" id="panelBody">
        <div class="sidebar-header">
          <h1 class="sidebar-title">Controls</h1>
        </div>

        <div class="sidebar-main">
          <div class="color-card">
            <label>Wordmark</label>
            <div class="word-switch">
              <button class="word-button is-active" id="wordUpper" type="button">ANDO</button>
              <button class="word-button" id="wordLower" type="button">ando</button>
            </div>
          </div>

          <div class="color-card">
            <label for="bgHex">Background</label>
            <div class="compact-control compact-control--hex-only">
              <button class="swatch-button" id="bgSwatch" type="button" aria-label="Pick background color"></button>
              <input class="compact-hex" id="bgHex" type="text" value="#FAFAF8" spellcheck="false" />
            </div>
          </div>

          <div class="color-card">
            <label for="accentHexSoft">Trail Soft</label>
            <div class="compact-control">
              <button class="swatch-button" id="accentSwatchSoft" type="button" aria-label="Pick trail soft color"></button>
              <input class="compact-hex" id="accentHexSoft" type="text" value="#2563EB" spellcheck="false" />
              <div class="compact-opacity">
                <input class="compact-number" id="weakOpacityNumber" type="number" min="0" max="100" step="1" value="40" />
                <span>%</span>
              </div>
            </div>
          </div>

          <div class="color-card">
            <label for="accentHexStrong">Trail Strong</label>
            <div class="compact-control">
              <button class="swatch-button" id="accentSwatchStrong" type="button" aria-label="Pick trail strong color"></button>
              <input class="compact-hex" id="accentHexStrong" type="text" value="#2563EB" spellcheck="false" />
              <div class="compact-opacity">
                <input class="compact-number" id="strongOpacityNumber" type="number" min="0" max="100" step="1" value="80" />
                <span>%</span>
              </div>
            </div>
          </div>

          <div class="color-card">
            <label for="baseHex">Resting Dots</label>
            <div class="compact-control">
              <button class="swatch-button" id="baseSwatch" type="button" aria-label="Pick resting dots color"></button>
              <input class="compact-hex" id="baseHex" type="text" value="#2B2B2B" spellcheck="false" />
              <div class="compact-opacity">
                <input class="compact-number" id="baseOpacityNumber" type="number" min="0" max="100" step="1" value="22" />
                <span>%</span>
              </div>
            </div>
          </div>

        </div>

        <div class="sidebar-footer">
          <label>Moving Mask</label>
          <button class="toggle-button" id="maskOutlineToggle" type="button">Outline Off</button>
        </div>
      </div>
    </aside>

    <button class="sidebar-handle" id="panelToggle" type="button" aria-expanded="true" aria-controls="panelBody" aria-label="Close controls">
      <svg viewBox="0 0 40 40" aria-hidden="true">
        <path d="M10 10L30 30"></path>
        <path d="M30 10L10 30"></path>
      </svg>
    </button>
  </div>

  <div class="picker-panel" id="colorPicker" hidden>
    <div class="picker-surface" id="pickerSurface">
      <div class="picker-surface-handle" id="pickerSurfaceHandle"></div>
    </div>
    <div class="picker-sliders">
      <div class="picker-slider-wrap">
        <div class="picker-slider-track picker-slider-track--hue"></div>
        <input class="picker-slider" id="pickerHue" type="range" min="0" max="360" step="1" value="0" />
      </div>
      <div class="picker-slider-wrap picker-alpha-wrap" id="pickerAlphaWrap">
        <div class="picker-slider-track picker-slider-track--alpha" id="pickerAlphaTrack"></div>
        <input class="picker-slider" id="pickerAlpha" type="range" min="0" max="100" step="1" value="100" />
      </div>
    </div>
    <div class="picker-footer">
      <div class="picker-mode">HEX</div>
      <input class="picker-input picker-input--hex" id="pickerHexInput" type="text" spellcheck="false" value="#FFFFFF" />
      <input class="picker-input picker-input--opacity" id="pickerOpacityInput" type="number" min="0" max="100" step="1" value="100" />
      <span class="picker-percent" id="pickerPercent">%</span>
    </div>
  </div>

  function rgbToHsv(r, g, b){
    const rn = r / 255;
    const gn = g / 255;
    const bn = b / 255;
    const max = Math.max(rn, gn, bn);
    const min = Math.min(rn, gn, bn);
    const delta = max - min;
    let hue = 0;
    if (delta) {
      if (max === rn) hue = ((gn - bn) / delta) % 6;
      else if (max === gn) hue = (bn - rn) / delta + 2;
      else hue = (rn - gn) / delta + 4;
      hue *= 60;
      if (hue < 0) hue += 360;
    }
    return {
      h: hue,
      s: max === 0 ? 0 : delta / max,
      v: max
    };
  }

  function hsvToRgb(h, s, v){
    const hue = ((h % 360) + 360) % 360;

    const segment = hue / 60;
    const x = chroma * (1 - Math.abs((segment % 2) - 1));
    let r = 0;
    let g = 0;
    let b = 0;
    if (segment >= 0 && segment < 1) [r, g, b] = [chroma, x, 0];
    else if (segment < 2) [r, g, b] = [x, chroma, 0];
    else if (segment < 3) [r, g, b] = [0, chroma, x];
    else if (segment < 4) [r, g, b] = [0, x, chroma];
    else if (segment < 5) [r, g, b] = [x, 0, chroma];
    else [r, g, b] = [chroma, 0, x];
    const match = v - chroma;
    return {
      r: Math.round((r + match) * 255),
      g: Math.round((g + match) * 255),
      b: Math.round((b + match) * 255)
    };

    if (!hitAlpha) return false;
    const pulse = Math.sin(performance.now() * 0.01);
    const hoverRadius = Math.max(1, HOVER_BASE_RADIUS + HOVER_PULSE_RADIUS * pulse);
    const radiusCeil = Math.ceil(hoverRadius);
    const radiusSq = hoverRadius * hoverRadius;
    const sx = Math.floor(x);
    const sy = Math.floor(y);

    for (let offsetY = -radiusCeil; offsetY <= radiusCeil; offsetY += 1) {
      const py0 = sy + offsetY;
      if (py0 < 0 || py0 >= hitH) continue;
      for (let offsetX = -radiusCeil; offsetX <= radiusCeil; offsetX += 1) {
        if (offsetX * offsetX + offsetY * offsetY > radiusSq) continue;
        const px0 = sx + offsetX;
        if (px0 < 0 || px0 >= hitW) continue;
        if (hitAlpha[(py0 * hitW + px0) * 4 + 3] > HOVER_ALPHA_THRESHOLD) return true;
      }
    }
    return false;
  }

  function setCursorState(isOverWord){
    const cursor = isOverWord ? 'crosshair' : 'default';
    stage.style.cursor = cursor;
    canvas.style.cursor = cursor;
  }

  function smoothstep(value){
    return value * value * (3 - 2 * value);
  }

  function getTrailShrinkSpeed(x, y){
    const broadWave = Math.sin(x * 0.011 + y * 0.006);
    const fineWave = Math.sin(x * 0.027 - y * 0.019 + 1.7);
    const variation = clamp(0.5 + broadWave * 0.32 + fineWave * 0.18, 0, 1);
    return TRAIL_MIN_SHRINK_SPEED +
      (TRAIL_MAX_SHRINK_SPEED - TRAIL_MIN_SHRINK_SPEED) * variation;
  }

  function getTrailDither(x, y){
    const gridX = Math.round(x / cfg.cell);
    const gridY = Math.round(y / cfg.cell);
    const coarse = Math.sin(gridX * 71.31 + gridY * 29.17) * 19341.731;
    const fine = Math.sin(gridX * 17.73 - gridY * 83.91 + 2.4) * 41758.129;
    const noise =
      (coarse - Math.floor(coarse)) * 0.68 +
      (fine - Math.floor(fine)) * 0.32;
    return (noise - 0.5) * 2 * TRAIL_DITHER_AMOUNT;
  }

  function queuePointerSegment(nx, ny){
    const now = performance.now();
    if (!hasPointer) {
      hasPointer = true;
      followerX = nx;
      followerY = ny;
      trailSpeed = 0;
    }
    px = nx;
    py = ny;
    lastPointerInputAt = now;
  }

  function getAdaptiveTrailRadius(now){
    const letterHeight = Math.max(1, bandH);
    const defaultRadius = letterHeight * TRAIL_DEFAULT_HEIGHT_RATIO * 0.5;
    const dynamicRange = letterHeight * TRAIL_DYNAMIC_HEIGHT_RATIO;
    const speedNorm = clamp(trailSpeed / 22, 0, 1);
    const slowRadius = 20;
    const fastRadius = clamp(defaultRadius + dynamicRange * 0.7, slowRadius + 4, letterHeight * 0.3);
    const baseRadius = slowRadius + (fastRadius - slowRadius) * smoothstep(speedNorm);
    const pulseBias = Math.sin(now * 0.0032 + trailSpeed * 0.045) * dynamicRange * (0.28 + speedNorm * 0.22);
    return clamp(
      baseRadius + pulseBias,
      slowRadius,
      letterHeight * 0.3
    );
  }

  function getRestingWaveBand(x, y, now){
    const normalizedX = x / Math.max(W, 1);
    const normalizedY = y / Math.max(H, 1);
    const wobble =
      Math.sin(normalizedX * TAU * 1.15 + now * RESTING_WAVE_WOBBLE_SPEED) * RESTING_WAVE_WOBBLE +
      Math.sin(normalizedX * TAU * 2.8 - now * RESTING_WAVE_WOBBLE_SPEED * 1.35) * (RESTING_WAVE_WOBBLE * 0.48) +
      Math.sin(normalizedX * TAU * 6.4 + now * RESTING_WAVE_WOBBLE_SPEED * 0.62) * (RESTING_WAVE_WOBBLE * 0.16);
    const phase = (normalizedY + wobble) * RESTING_WAVE_DENSITY - now * RESTING_WAVE_SPEED;
    const gridX = Math.round(x / cfg.cell);
    const gridY = Math.round(y / cfg.cell);
    const staticNoise = Math.sin(gridX * 91.73 + gridY * 37.19) * 43758.5453;
    const dither = (staticNoise - Math.floor(staticNoise) - 0.5) * RESTING_WAVE_DITHER;
    const grainPulse = Math.sin(gridX * 0.41 + gridY * 0.27 + now * 0.00022) * 0.035;
    const wave = Math.sin(phase * TAU) + dither + grainPulse;
    if (wave > 0.76) return 2;
    if (wave > -0.76) return 1;
    return 0;
  }

  function frame(now){
    ctx.clearRect(0, 0, W, H);

    const idleMaskState = reduceMotion ? null : getIdleMask(now);
    const idleMask = idleMaskState ? idleMaskState.data : null;
    const prevFollowerX = followerX;
    const prevFollowerY = followerY;
    if (hasPointer) {
      followerX += (px - followerX) * FOLLOW_EASE;
      followerY += (py - followerY) * FOLLOW_EASE;
    }
    const segDX = followerX - prevFollowerX;
    const segDY = followerY - prevFollowerY;
    const moveDist = Math.hypot(segDX, segDY);
    trailSpeed = trailSpeed * 0.92 + moveDist * 0.08;
    const segmentActive = moveDist > 0.001;
    const segmentRadius = getAdaptiveTrailRadius(now);
    const segmentReach = segmentRadius * (1 + TRAIL_DITHER_AMOUNT);
    const segmentR2 = segmentReach * segmentReach;
    drawBackdropDots(idleMaskState, prevFollowerX, prevFollowerY, followerX, followerY, segmentActive, segmentRadius);

    const restingLevels = [
      clamp(cfg.baseA * 0.5, 0, 1),
      clamp(cfg.baseA, 0, 1),
      clamp(cfg.baseA * 2, 0, 1)
    ];
    const restingPaths = [new Path2D(), new Path2D(), new Path2D()];
    const scaledBaseR = cfg.baseR;
    const scaledDotR = cfg.dotR;

    for (let i = 0; i < N; i += 1) {
      let idleActive = false;
      if (idleMask) {
        const sx = (cx[i] / MDS) | 0;
        const sy = (cy[i] / MDS) | 0;
        if (sx >= 0 && sy >= 0 && sx < maskW && sy < maskH && idleMask[(sy * maskW + sx) * 4 + 3] > 40) {
          idleActive = true;
        }
      }

      const segmentDistanceSq = segmentActive
        ? pointSegmentDistSq(cx[i], cy[i], prevFollowerX, prevFollowerY, followerX, followerY)
        : Infinity;
      const trailDither = getTrailDither(cx[i], cy[i]);
      const edge = Math.sqrt(segmentDistanceSq) / Math.max(1, segmentRadius);
      if (segmentDistanceSq <= segmentR2 && edge <= 1 + trailDither) {
        if (trailActive[i]) {
          trailEdge[i] = Math.min(trailEdge[i], edge);
        } else {
          trailEdge[i] = edge;
          trailStartedAt[i] = now;
        }
        trailActive[i] = 1;
      }

      const trailAge = now - trailStartedAt[i];
      const shrinkProgress = Math.max(0, trailAge / TRAIL_SHRINK_MS);
      const localEnvelope = Math.max(
        0,
        1 - shrinkProgress * getTrailShrinkSpeed(cx[i], cy[i])
      );
      const ditheredEnvelope = localEnvelope * (1 + trailDither);
      if (trailActive[i] && trailEdge[i] > ditheredEnvelope) {
        trailActive[i] = 0;
      }
      trailVisible[i] = trailActive[i];

      if (!trailVisible[i] && !idleActive) {
        const path = restingPaths[getRestingWaveBand(cx[i], cy[i], now)];
        path.moveTo(cx[i] + scaledBaseR, cy[i]);
        path.arc(cx[i], cy[i], scaledBaseR, 0, TAU);
      }
    }
    for (let index = 0; index < restingPaths.length; index += 1) {
      ctx.fillStyle = rgba(cfg.baseHex, restingLevels[index]);
      ctx.fill(restingPaths[index]);
    }

    const weakFill = rgba(cfg.accentHexWeak, cfg.weakA);
    const strongFill = rgba(cfg.accentHexStrong, cfg.strongA);
    const dotRadius = snapSize(Math.max(scaledDotR, scaledBaseR));
    for (let i = 0; i < N; i += 1) {
      let idleActive = false;
      if (idleMask) {
        const sx = (cx[i] / MDS) | 0;
        const sy = (cy[i] / MDS) | 0;
        idleActive = sx >= 0 && sy >= 0 && sx < maskW && sy < maskH && idleMask[(sy * maskW + sx) * 4 + 3] > 40;
      }
      if (idleActive && !trailVisible[i]) {
        if (strong[i]) {
          const live = interactiveCellOffset(
            cx[i],
            cy[i],
            now,
            strongCluster[i] || 0.5,
            segmentActive,
            segmentRadius
          );
          const x = snap(cx[i] + live.x);
          const y = snap(cy[i] + live.y);
          ctx.fillStyle = rgba(cfg.accentHexStrong, Math.min(0.18, cfg.strongA * 0.18));
          ctx.beginPath();
          ctx.arc(x, y, dotRadius * 1.14, 0, TAU);
          ctx.fill();
          ctx.fillStyle = strongFill;
          ctx.beginPath();
          ctx.arc(x, y, dotRadius * 1.06, 0, TAU);
          ctx.fill();
        } else {
          ctx.fillStyle = weakFill;
          ctx.beginPath();
          ctx.arc(snap(cx[i]), snap(cy[i]), dotRadius, 0, TAU);
          ctx.fill();
        }
      }
      if (!trailVisible[i]) continue;
      if (strong[i]) {
        const live = interactiveCellOffset(
          cx[i],
          cy[i],
          now,
          strongCluster[i] || 0.5,
          segmentActive,
          segmentRadius
        );
        const x = snap(cx[i] + live.x);
        const y = snap(cy[i] + live.y);
        ctx.fillStyle = rgba(cfg.accentHexStrong, Math.min(0.18, cfg.strongA * 0.18));
        ctx.beginPath();
        ctx.arc(x, y, dotRadius * 1.14, 0, TAU);
        ctx.fill();
        ctx.fillStyle = strongFill;
        ctx.beginPath();
        ctx.arc(x, y, dotRadius * 1.06, 0, TAU);
        ctx.fill();
      } else {
        ctx.fillStyle = weakFill;
        ctx.beginPath();
        ctx.arc(snap(cx[i]), snap(cy[i]), dotRadius, 0, TAU);
        ctx.fill();
      }
    }

    drawMaskOutline(idleMaskState);

    requestAnimationFrame(frame);
  }

  function updateTheme(){
    document.documentElement.style.setProperty('--bg', cfg.bgHex);
    document.documentElement.style.setProperty('--accent', cfg.accentHexWeak);
  }

  function syncColorPair(swatchButton, textInput, value){
    syncSwatch(swatchButton, value);
    textInput.value = value;
  }

  function syncOpacityInput(numberInput, decimal){
    numberInput.value = Math.round(decimal * 100);
  }

  function applyPaletteToInputs(){
    syncColorPair(inputs.bgSwatch, inputs.bgHex, cfg.bgHex);
    syncColorPair(inputs.accentSwatchSoft, inputs.accentHexSoft, cfg.accentHexWeak);
    syncColorPair(inputs.accentSwatchStrong, inputs.accentHexStrong, cfg.accentHexStrong);
    syncColorPair(inputs.baseSwatch, inputs.baseHex, cfg.baseHex);
    syncOpacityInput(inputs.weakOpacityNumber, cfg.weakA);
    syncOpacityInput(inputs.strongOpacityNumber, cfg.strongA);
    syncOpacityInput(inputs.baseOpacityNumber, cfg.baseA);
    updateTheme();
  }

  function syncWordButtons(){
    inputs.wordUpper.classList.toggle('is-active', cfg.word === 'upper');
    inputs.wordLower.classList.toggle('is-active', cfg.word === 'lower');
  }

  function syncMaskOutlineButton(){
    inputs.maskOutlineToggle.classList.toggle('is-active', cfg.showMaskOutline);
    inputs.maskOutlineToggle.textContent = cfg.showMaskOutline ? 'Outline On' : 'Outline Off';
  }

  function setWord(word){
    cfg.word = word;
    syncWordButtons();
    buildField();
  }

  function setPanelOpen(isOpen){
    document.body.classList.toggle('sidebar-open', isOpen);
    document.body.classList.toggle('sidebar-closed', !isOpen);
    inputs.panel.classList.toggle('is-open', isOpen);
    inputs.panel.classList.toggle('is-collapsed', !isOpen);
    inputs.panelToggle.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    inputs.panelToggle.setAttribute('aria-label', isOpen ? 'Close controls' : 'Open controls');
    inputs.panelToggle.innerHTML = getSidebarIcon(isOpen);
    scheduleResize();
    clearTimeout(sidebarResizeTimer);
    sidebarResizeTimer = setTimeout(scheduleResize, 320);
  }

  function getPickerHex(){
    const { r, g, b } = hsvToRgb(pickerState.hue, pickerState.sat, pickerState.val);
    return rgbToHex(r, g, b);
  }

  function positionColorPicker(anchor){
    const rect = anchor.getBoundingClientRect();
    const pickerRect = inputs.colorPicker.getBoundingClientRect();
    const gap = 12;
    const maxLeft = window.innerWidth - pickerRect.width - 12;
    const maxTop = window.innerHeight - pickerRect.height - 12;
    let left = rect.left - pickerRect.width - gap;
    if (left < 12) left = rect.right + gap;
    if (left > maxLeft) left = maxLeft;
    let top = rect.top - 6;
    if (top > maxTop) top = maxTop;
    if (top < 12) top = 12;
    inputs.colorPicker.style.left = `${left}px`;
    inputs.colorPicker.style.top = `${top}px`;
  }

  function renderColorPicker(){
    const hueColor = `hsl(${pickerState.hue} 100% 50%)`;
    const hex = getPickerHex();
    const { r, g, b } = hexToRgb(hex);
    inputs.pickerSurface.style.background = `linear-gradient(to top, #000, transparent), linear-gradient(to right, #fff, ${hueColor})`;
    inputs.pickerSurfaceHandle.style.left = `${pickerState.sat * 100}%`;
    inputs.pickerSurfaceHandle.style.top = `${(1 - pickerState.val) * 100}%`;
    inputs.pickerHue.value = Math.round(pickerState.hue);
    inputs.pickerHexInput.value = hex;
    const showAlpha = Boolean(pickerState.alphaKey);
    inputs.pickerAlphaWrap.classList.toggle('is-hidden', !showAlpha);
    inputs.pickerPercent.classList.toggle('is-hidden', !showAlpha);
    inputs.pickerOpacityInput.disabled = !showAlpha;
    inputs.pickerOpacityInput.value = Math.round((showAlpha ? pickerState.alpha : 1) * 100);
    inputs.pickerAlpha.value = Math.round((showAlpha ? pickerState.alpha : 1) * 100);
    inputs.pickerAlphaTrack.style.setProperty('--alpha-start', `rgba(${r},${g},${b},0)`);
    inputs.pickerAlphaTrack.style.setProperty('--alpha-end', `rgba(${r},${g},${b},1)`);
  }

  function commitPicker(){
    if (!pickerState.colorKey) return;
    const hex = getPickerHex();
    cfg[pickerState.colorKey] = hex;
    if (pickerState.alphaKey) cfg[pickerState.alphaKey] = pickerState.alpha;
    if (pickerState.syncColor) pickerState.syncColor(hex);
    if (pickerState.syncAlpha) pickerState.syncAlpha(pickerState.alpha);
    updateTheme();
    renderColorPicker();
  }

  function closeColorPicker(){
    inputs.colorPicker.hidden = true;
    pickerState.open = false;
    pickerState.anchor = null;
    if (pickerDragCleanup) {
      pickerDragCleanup();
      pickerDragCleanup = null;
    }
  }

  function openColorPicker(options){
    const rgb = hexToRgb(cfg[options.colorKey]);
    const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
    pickerState.open = true;
    pickerState.colorKey = options.colorKey;
    pickerState.alphaKey = options.alphaKey || null;
    pickerState.syncColor = options.syncColor || null;
    pickerState.syncAlpha = options.syncAlpha || null;
    pickerState.hue = hsv.h;
    pickerState.sat = hsv.s;
    pickerState.val = hsv.v;
    pickerState.alpha = options.alphaKey ? cfg[options.alphaKey] : 1;
    pickerState.anchor = options.anchor;
    inputs.colorPicker.hidden = false;
    renderColorPicker();
    positionColorPicker(options.anchor);
  }

  function startSurfaceDrag(event){
    event.preventDefault();
    const updateFromPoint = (clientX, clientY) => {
      const rect = inputs.pickerSurface.getBoundingClientRect();
      pickerState.sat = clamp((clientX - rect.left) / rect.width, 0, 1);
      pickerState.val = clamp(1 - (clientY - rect.top) / rect.height, 0, 1);
      commitPicker();
    };
    updateFromPoint(event.clientX, event.clientY);
    const handleMove = (moveEvent) => updateFromPoint(moveEvent.clientX, moveEvent.clientY);
    const handleUp = () => {
      window.removeEventListener('pointermove', handleMove);
      window.removeEventListener('pointerup', handleUp);
      pickerDragCleanup = null;
    };
    window.addEventListener('pointermove', handleMove);
    window.addEventListener('pointerup', handleUp, { once: true });
    pickerDragCleanup = handleUp;
  }

  function bindHexControl(swatchButton, textInput, key, sync){
    const commit = (raw) => {
      cfg[key] = normalizeHex(raw, cfg[key]);
      sync(cfg[key]);
      updateTheme();
    };
    textInput.addEventListener('change', () => commit(textInput.value));
    textInput.addEventListener('blur', () => commit(textInput.value));
  }

  function bindPickerTrigger(swatchButton, options){
    swatchButton.addEventListener('click', () => {
      if (pickerState.open && pickerState.anchor === swatchButton) {
        closeColorPicker();
        return;
      }
      openColorPicker({
        anchor: swatchButton,
        colorKey: options.colorKey,
        alphaKey: options.alphaKey,
        syncColor: options.syncColor,
        syncAlpha: options.syncAlpha
      });
    });
  }

  function bindOpacityControl(numberInput, key){
    const commit = (raw) => {
      const percent = clamp(Number(raw) || 0, 0, 100);
      cfg[key] = percent / 100;
      numberInput.value = percent;
    };
    numberInput.addEventListener('input', () => commit(numberInput.value));
    numberInput.addEventListener('blur', () => commit(numberInput.value));
  }

  stage.addEventListener('pointermove', (event) => {
    const rect = stage.getBoundingClientRect();
    const nx = event.clientX - rect.left;
    const ny = event.clientY - rect.top;
    queuePointerSegment(nx, ny);
    setCursorState(isPointOnWord(nx, ny));
  });
  stage.addEventListener('pointerleave', () => {
    hasPointer = false;
    setCursorState(false);
  });

  bindHexControl(inputs.bgSwatch, inputs.bgHex, 'bgHex', (value) => syncColorPair(inputs.bgSwatch, inputs.bgHex, value));
  bindHexControl(inputs.accentSwatchSoft, inputs.accentHexSoft, 'accentHexWeak', (value) => {
    syncColorPair(inputs.accentSwatchSoft, inputs.accentHexSoft, value);
  });
  bindHexControl(inputs.accentSwatchStrong, inputs.accentHexStrong, 'accentHexStrong', (value) => {
    syncColorPair(inputs.accentSwatchStrong, inputs.accentHexStrong, value);
  });
  bindHexControl(inputs.baseSwatch, inputs.baseHex, 'baseHex', (value) => syncColorPair(inputs.baseSwatch, inputs.baseHex, value));
  bindOpacityControl(inputs.weakOpacityNumber, 'weakA');
  bindOpacityControl(inputs.strongOpacityNumber, 'strongA');
  bindOpacityControl(inputs.baseOpacityNumber, 'baseA');
  bindPickerTrigger(inputs.bgSwatch, {
    colorKey: 'bgHex',
    syncColor: (value) => syncColorPair(inputs.bgSwatch, inputs.bgHex, value)
  });
  bindPickerTrigger(inputs.accentSwatchSoft, {
    colorKey: 'accentHexWeak',
    alphaKey: 'weakA',
    syncColor: (value) => {
      syncColorPair(inputs.accentSwatchSoft, inputs.accentHexSoft, value);
    },
    syncAlpha: (value) => syncOpacityInput(inputs.weakOpacityNumber, value)
  });
  bindPickerTrigger(inputs.accentSwatchStrong, {
    colorKey: 'accentHexStrong',
    alphaKey: 'strongA',
    syncColor: (value) => {
      syncColorPair(inputs.accentSwatchStrong, inputs.accentHexStrong, value);
    },
    syncAlpha: (value) => syncOpacityInput(inputs.strongOpacityNumber, value)
  });
  bindPickerTrigger(inputs.baseSwatch, {
    colorKey: 'baseHex',
    alphaKey: 'baseA',
    syncColor: (value) => syncColorPair(inputs.baseSwatch, inputs.baseHex, value),
    syncAlpha: (value) => syncOpacityInput(inputs.baseOpacityNumber, value)
  });
  inputs.wordUpper.addEventListener('click', () => setWord('upper'));
  inputs.wordLower.addEventListener('click', () => setWord('lower'));
  inputs.maskOutlineToggle.addEventListener('click', () => {
    cfg.showMaskOutline = !cfg.showMaskOutline;
    syncMaskOutlineButton();
  });
  inputs.pickerSurface.addEventListener('pointerdown', startSurfaceDrag);
  inputs.pickerHue.addEventListener('input', () => {
    pickerState.hue = Number(inputs.pickerHue.value);
    commitPicker();
  });
  inputs.pickerAlpha.addEventListener('input', () => {
    pickerState.alpha = clamp(Number(inputs.pickerAlpha.value) / 100, 0, 1);
    commitPicker();
  });
  inputs.pickerHexInput.addEventListener('change', () => {
    const normalized = normalizeHex(inputs.pickerHexInput.value, getPickerHex());
    const rgb = hexToRgb(normalized);
    const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
    pickerState.hue = hsv.h;
    pickerState.sat = hsv.s;
    pickerState.val = hsv.v;
    commitPicker();
  });
  inputs.pickerHexInput.addEventListener('blur', () => {
    const normalized = normalizeHex(inputs.pickerHexInput.value, getPickerHex());
    const rgb = hexToRgb(normalized);
    const hsv = rgbToHsv(rgb.r, rgb.g, rgb.b);
    pickerState.hue = hsv.h;
    pickerState.sat = hsv.s;
    pickerState.val = hsv.v;
    commitPicker();
  });
  inputs.pickerOpacityInput.addEventListener('input', () => {
    if (!pickerState.alphaKey) return;
    pickerState.alpha = clamp((Number(inputs.pickerOpacityInput.value) || 0) / 100, 0, 1);
    commitPicker();
  });
  inputs.pickerOpacityInput.addEventListener('blur', () => {
    if (!pickerState.alphaKey) return;
    pickerState.alpha = clamp((Number(inputs.pickerOpacityInput.value) || 0) / 100, 0, 1);
    commitPicker();
  });
  inputs.panelToggle.addEventListener('click', () => {
    setPanelOpen(!inputs.panel.classList.contains('is-open'));
  });
  document.addEventListener('pointerdown', (event) => {
    if (!pickerState.open) return;
    if (inputs.colorPicker.contains(event.target)) return;
    if (event.target.closest('.swatch-button')) return;
    closeColorPicker();
  });
  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape' && pickerState.open) closeColorPicker();
  });

  let resizeTimer;
  let sidebarResizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(scheduleResize, 120);
    if (pickerState.open && pickerState.anchor) {
      requestAnimationFrame(() => positionColorPicker(pickerState.anchor));
    }
  });

  if (typeof ResizeObserver !== 'undefined') {
    const stageObserver = new ResizeObserver(() => {
      scheduleResize();
    });
    stageObserver.observe(stage);
  }

  applyPaletteToInputs();
  syncWordButtons();
  syncMaskOutlineButton();
  setPanelOpen(true);
  setCursorState(false);
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
